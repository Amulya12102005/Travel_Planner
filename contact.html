<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Contact TravelEase for smart travel planning, itinerary help, and collaboration support.">
    <title>Contact Us | TravelEase</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Open+Sans&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    
    <style>
        body { font-family: 'Open Sans', sans-serif; }
        h1, h2, h3 { font-family: 'Montserrat', sans-serif; }
    </style>
</head>
<body class="bg-gray-100 flex flex-col min-h-screen">

    <nav class="sticky top-0 z-50 bg-white shadow-md px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="text-2xl font-bold text-[#2E86C1]">TravelEase</div>
            <button id="menu-btn" class="md:hidden text-gray-700 focus:outline-none">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
            </button>
            <ul class="hidden md:flex space-x-8 font-semibold">
                <li><a href="index.html" class="hover:text-[#F39C12] transition">Home</a></li>
                <li><a href="about.html" class="hover:text-[#F39C12] transition">About</a></li>
                <li><a href="contact.html" class="text-[#F39C12]">Contact</a></li>
            </ul>
        </div>
        <div id="mobile-menu" class="hidden flex flex-col space-y-4 mt-4 md:hidden bg-white p-4 border-t">
            <a href="index.html" class="font-semibold">Home</a>
            <a href="about.html" class="font-semibold">About</a>
            <a href="contact.html" class="font-semibold text-[#F39C12]">Contact</a>
        </div>
    </nav>

    <main class="flex-grow flex items-center justify-center p-6">
        <div class="bg-white p-8 md:p-12 rounded-2xl shadow-xl w-full max-w-lg">
            <h2 class="text-3xl font-bold text-[#2E86C1] mb-6">Let's Talk Travel</h2>
            
            <form id="contactForm" class="space-y-4">
                <input type="text" id="userName" placeholder="Name" class="w-full border p-3 rounded-lg focus:ring-2 focus:ring-[#F39C12] outline-none" required>
                <input type="email" id="userEmail" placeholder="Email" class="w-full border p-3 rounded-lg focus:ring-2 focus:ring-[#F39C12] outline-none" required>
                <textarea id="userMessage" rows="4" placeholder="Your Travel Dreams..." class="w-full border p-3 rounded-lg outline-none focus:ring-2 focus:ring-[#F39C12]"></textarea>
                <button type="submit" class="w-full bg-[#F39C12] text-white py-3 rounded-lg font-bold hover:bg-orange-600 transition shadow-lg">Send Message</button>
            </form>
        </div>
    </main>

    <footer class="bg-gray-900 text-white py-6 text-center">
        <p>© 2026 TravelEase Planner | Responsive SEO Friendly Site</p>
    </footer>

    <script>
        // Hamburger Menu Logic
        document.getElementById('menu-btn').addEventListener('click', () => {
            document.getElementById('mobile-menu').classList.toggle('hidden');
        });

        // MongoDB Submission Logic
        const contactForm = document.getElementById('contactForm');
        contactForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const data = {
                name: document.getElementById('userName').value,
                email: document.getElementById('userEmail').value,
                message: document.getElementById('userMessage').value
            };

            try {
                // Connecting to your server.js running on Port 5000
                const response = await fetch('http://localhost:5000/api/contact', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (result.success) {
                    // SUCCESS POPUP REQUIREMENT
                    alert("✅ Message Sent Successfully! Your data is now in MongoDB.");
                    contactForm.reset();
                } else {
                    alert("❌ Submission failed. Please try again.");
                }
            } catch (err) {
                alert("❌ Error: Could not connect to the server. Make sure server.js is running.");
            }
        });
    </script>
</body>
</html>
